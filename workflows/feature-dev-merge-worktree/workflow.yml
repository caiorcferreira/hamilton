# Ralph loop (https://github.com/snarktank/ralph) — each agent runs in a fresh
# session with clean context. Memory persists via git history and progress files.
name: feature-dev-merge-worktree
version: 1
description: |
  Plan, implement, test, and squash-merge features story-by-story in a worktree with automated verification.
  Worktree variant of the story-based execution pipeline for local-only repos.
  Runs in a detached git worktree created from an origin repository.

  Planner decomposes tasks into user stories. Setup prepares the worktree
  environment ({{tasks.setup.outputs.original_branch}} is pre-seeded by the harness since the
  worktree starts detached). Developer implements each story (with tests) in
  a fresh session. Verifier checks each story.

  After integration/E2E testing, the workflow performs a final squash merge
  in the origin repository: all workflow branch changes are squashed into one
  commit and merged back into the original branch.
run:
  entrypoint: plan
  timeout: 300s
  workspace: worktree

agents:
  - name: planner
    role: analysis
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: agents/planner/AGENTS.md
        soul: agents/planner/SOUL.md
        identity: agents/planner/IDENTITY.md

  - name: setup
    role: coding
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: shared/agents/setup/AGENTS.md
        soul: shared/agents/setup/SOUL.md
        identity: shared/agents/setup/IDENTITY.md

  - name: developer
    role: coding
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: agents/developer/AGENTS.md
        soul: agents/developer/SOUL.md
        identity: agents/developer/IDENTITY.md

  - name: verifier
    role: verification
    settings:
      model: default
      skills:
        - agent-browser
        - hamilton-agents
      systemPrompt:
        agent: shared/agents/verifier/AGENTS.md
        soul: shared/agents/verifier/SOUL.md
        identity: shared/agents/verifier/IDENTITY.md

  - name: tester
    role: testing
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: agents/tester/AGENTS.md
        soul: agents/tester/SOUL.md
        identity: agents/tester/IDENTITY.md

  - name: merger
    role: pr
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: agents/merger/AGENTS.md
        soul: agents/merger/SOUL.md
        identity: agents/merger/IDENTITY.md

tasks:
  - name: plan
    dependencies: []
    agent:
      ref: agents.planner
      prompt:
        content: |
          Decompose the following task into ordered user stories for autonomous execution.

          TASK:
          {{task}}

          RETRY FEEDBACK (only present if your previous attempt was rejected — read carefully and fix specifically what it complains about):
          {{retry_feedback}}

          Instructions:
          1. Explore the codebase to understand the stack, conventions, and patterns
          2. Break the task into small user stories (max 20)
          3. Order by dependency: schema/DB first, backend, frontend, integration
          4. Each story must fit in one developer session (one context window)
          5. Every acceptance criterion must be mechanically verifiable
          6. Always include "Typecheck passes" as the last criterion in every story
          7. Every story MUST include test criteria — "Tests for [feature] pass"
          8. The developer is expected to write tests as part of each story

          Reply with:
          STATUS: done
          REPO: /path/to/repo
          BRANCH: <new-feature-branch-name to create for this run, e.g. feature/short-description — MUST be a fresh, descriptive name; MUST NOT be a default/integration branch like main, master, trunk, develop, dev, or release; the setup step will `git checkout -b` this name and the finalize_merge step squashes it back into the original branch>
          STORIES_JSON: [ ... array of story objects ... ]

          The STORIES_JSON line is REQUIRED and MUST be a literal JSON array on a single line with no line breaks inside the JSON array. Example (illustrative — produce real stories for the actual TASK, not these):
          STORIES_JSON: [{"id":"US-001","title":"Add foo column","description":"...","acceptanceCriteria":["foo exists","tests pass","Typecheck passes"]}]

          ⚠️ ANTI-PATTERNS — DO NOT DO:
          - Do NOT use triple backticks (```) around STORIES_JSON
          - Do NOT add comments inside the JSON
          - Do NOT put any text after the closing ] on the STORIES_JSON line

          Without STORIES_JSON the run cannot proceed; do not summarize stories in prose under CHANGES — only the literal STORIES_JSON line is parsed.
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: setup
    dependencies: [plan]
    agent:
      ref: agents.setup
      prompt:
        content: |
          Prepare the development environment for this feature in a detached git worktree.

          TASK:
          {{task}}

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}
          ORIGINAL_BRANCH: {{tasks.setup.outputs.original_branch}}
          WORKTREE_ORIGIN_REPOSITORY: {{tasks.setup.outputs.worktree_origin_repository}}

          RETRY FEEDBACK (only present if your previous attempt was rejected — read carefully and fix specifically what it complains about):
          {{retry_feedback}}

          Instructions:
          1. cd into the repo (this is the worktree path)
          2. ORIGINAL_BRANCH is {{tasks.setup.outputs.original_branch}} — pre-seeded by the harness since the worktree starts detached; do NOT run `git branch --show-current`
          3. Create the feature branch (git checkout -b {{tasks.setup.outputs.branch}})
          4. Read package.json, CI config, test config to understand the build/test setup
          5. Ensure .gitignore exists — if missing, create one appropriate for the detected stack (must include .env, node_modules/, *.key, *.pem at minimum)
          6. Run the build to establish a baseline
          7. Run the tests to establish a baseline
          8. Report what you found

          Reply with:
          STATUS: done
          ORIGINAL_BRANCH: {{tasks.setup.outputs.original_branch}}
          BUILD_CMD: <build command>
          TEST_CMD: <test command>
          CI_NOTES: <brief CI notes>
          BASELINE: <baseline status>
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: implement-stories
    dependencies: [setup]
    template: implement-story
    forEach:
      valueFrom:
        ref: tasks.plan.outputs.stories_json
      as: current_story

  - name: implement-story
    agent:
      ref: agents.developer
      prompt:
        content: |
          Implement the following user story. You are working on ONE story in a fresh session.

          TASK (overall):
          {{task}}

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}
          BUILD_CMD: {{tasks.setup.outputs.build_cmd}}
          TEST_CMD: {{tasks.setup.outputs.test_cmd}}

          CURRENT STORY:
          {{vars.current_story}}

          COMPLETED STORIES:
          {{completed_stories}}

          STORIES REMAINING: {{stories_remaining}}

          VERIFY FEEDBACK (if retrying):
          {{verify_feedback}}

          TIMEOUT RETRY (if previous attempt timed out):
          {{timeout_retry}}

          PROGRESS LOG:
          {{progress}}

          Instructions:
          1. Read progress-{{run_id}}.txt — especially the Codebase Patterns section
          2. Pull latest on the branch
          3. Implement this story only
          4. Write tests for this story's functionality
          5. Run typecheck / build
          6. Run tests to confirm they pass
          7. Commit: feat: {{vars.current_story.id}} - {{vars.current_story.title}}
          8. Rewrite progress-{{run_id}}.txt with updated story results and patterns
          9. Update Codebase Patterns if you found reusable patterns

          Reply with:
          STATUS: done
          CHANGES: what you implemented
          TESTS: what tests you wrote
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: verify-stories
    dependencies: [implement-stories]
    template: verify-story
    forEach:
      valueFrom:
        ref: tasks.plan.outputs.stories_json
      as: current_story

  - name: verify-story
    agent:
      ref: agents.verifier
      prompt:
        content: |
          Verify the developer's work on this story.

          TASK (overall):
          {{task}}

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}
          CHANGES: {{changes}}
          TEST_CMD: {{tasks.setup.outputs.test_cmd}}

          CURRENT STORY:
          {{vars.current_story}}

          PROGRESS LOG:
          {{progress}}

          Check:
          1. Code exists (not just TODOs or placeholders)
          2. Each acceptance criterion for the story is met
          3. Tests were written for this story's functionality
          4. Tests pass (run {{tasks.setup.outputs.test_cmd}})
          5. No obvious incomplete work
          6. Typecheck passes

          ## Visual Verification (Frontend Changes)
          Has frontend changes: {{has_frontend_changes}}

          If {{has_frontend_changes}} is 'true', you MUST also perform visual verification:
          1. Use the agent-browser skill to visually inspect the changed UI
          2. Open the changed HTML file directly (file:// URL) or spin up a local dev server if the project requires one
          3. Take a screenshot of the rendered page
          4. Visually confirm:
             - Layout renders correctly (no broken/overlapping elements)
             - Styling is applied as expected (colors, fonts, spacing)
             - All visible elements from the story are present and properly positioned
             - No missing images, icons, or visual assets
             - Text is readable and not clipped or hidden
          5. A visual PASS means: the page renders without broken layout, missing elements, or overlapping content
          6. A visual FAIL means: broken layout, missing/invisible elements, overlapping or misaligned content, unstyled raw HTML, or obvious rendering errors
          7. Include your visual findings in VERIFIED output

          If {{has_frontend_changes}} is 'false', skip visual verification entirely.

          Reply with:
          STATUS: done
          VERIFIED: What you confirmed

          Or if incomplete:
          STATUS: retry
          ISSUES:
          - What's missing or incomplete
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: test
    dependencies: [verify-stories]
    agent:
      ref: agents.tester
      prompt:
        content: |
          Integration and E2E testing of the implementation.

          TASK:
          {{task}}

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}
          CHANGES: {{changes}}
          BUILD_CMD: {{tasks.setup.outputs.build_cmd}}
          TEST_CMD: {{tasks.setup.outputs.test_cmd}}

          PROGRESS LOG:
          {{progress}}

          RETRY FEEDBACK (only present if merger rebased the branch and needs re-validation — contains CONFLICT_NOTES describing what changed):
          {{retry_feedback}}

          Your job (integration/E2E testing — unit tests were already written per-story):
          1. Run the full test suite ({{tasks.setup.outputs.test_cmd}}) to confirm everything passes together
          2. Look for integration issues between stories
          3. If this is a UI feature, use agent-browser to test it end-to-end
          4. Check cross-cutting concerns: error handling, edge cases across features
          5. Verify the overall feature works as a cohesive whole
          6. If retry feedback is present, the merger rebased the branch to resolve conflicts — re-validate the rebased changes listed in the feedback

          Reply with:
          STATUS: done
          RESULTS: What you tested and the outcomes

          Or if issues found:
          STATUS: retry
          FAILURES:
          - Specific test failures or bugs found
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: finalize-merge
    dependencies: [test]
    agent:
      ref: agents.merger
      prompt:
        content: |
          Finalize this run by squashing workflow changes into one commit and merging
          into the original branch in the origin repository. Follow the fast-forward-first
          process described in your AGENTS.md.

          RUN_ID: {{run_id}}

          TASK:
          {{task}}

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}
          ORIGINAL_BRANCH: {{tasks.setup.outputs.original_branch}}
          WORKTREE_ORIGIN_REPOSITORY: {{tasks.setup.outputs.worktree_origin_repository}}

          PROGRESS LOG:
          {{progress}}

          RETRY FEEDBACK (only present if the tester re-validated a rebased branch — the tester has confirmed the rebased changes pass; proceed to Phase 3 squash merge):
          {{retry_feedback}}

          Follow the Required Process from your AGENTS.md.

          IMPORTANT — Worktree Mode: All git operations below (phases 1–3) must run
          in the ORIGIN repository, NOT the worktree. Use:
            git -C {{tasks.setup.outputs.worktree_origin_repository}} <command>
          for every git command. The worktree at {{tasks.setup.outputs.repo}} contains the feature branch
          changes; the origin at {{tasks.setup.outputs.worktree_origin_repository}} is where the merge
          must be finalized.

          Phase 1 — Fast-Forward Check (ALWAYS FIRST):
          1. cd {{tasks.setup.outputs.worktree_origin_repository}}
          2. git checkout {{tasks.setup.outputs.original_branch}}
          3. git merge-base --is-ancestor {{tasks.setup.outputs.original_branch}} {{tasks.setup.outputs.branch}}
             - Exit 0 (FF): proceed to Phase 3
             - Exit non-zero (not FF): proceed to Phase 2

          Phase 2 — Rebase (Non-Fast-Forward Path):
          4. cd {{tasks.setup.outputs.repo}}
          5. git rebase {{tasks.setup.outputs.original_branch}}
          6. Fix any conflicts; `git rebase --continue` until complete
          7. If rebase changed code/tests/docs/config:
             - Report STATUS: retry with REBASED: true, CONFLICT_NOTES, RETRY_STEP: test
             - Do NOT merge — tester must re-validate first
          8. If rebase was clean: proceed to Phase 3

          Phase 3 — Squash Merge (Fast-Forward-Safe):
          9. cd {{tasks.setup.outputs.worktree_origin_repository}}
          10. git checkout {{tasks.setup.outputs.original_branch}}
          11. git merge --squash {{tasks.setup.outputs.branch}}
          12. Build a descriptive commit message (see AGENTS.md for full instructions), write it to a temp file, then commit with `git commit -F <tempfile>`

          Verify the merge commit was created:
          - MERGE_COMMIT=$(git rev-parse --short HEAD)

          Reply with:
          STATUS: done
          REBASED: <true|false>
          MERGE_COMMIT: <short commit hash>
          MERGED_INTO: {{tasks.setup.outputs.original_branch}}

          Or if rebase requires tester re-validation:
          STATUS: retry
          REBASED: true
          CONFLICT_NOTES: <description of resolved conflicts>
          RETRY_STEP: test

          Or if merge cannot be completed:
          STATUS: retry
          REBASED: <true|false>
          FAILURE: <reason>
    on_failure:
      max_retries: 4
      escalate_to: human