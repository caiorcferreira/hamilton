# Ralph loop (https://github.com/snarktank/ralph) — fresh context per agent session
name: bug-fix-merge
version: 1
description: |
  Triage, investigate, and fix bugs in a new branch with automatic squash-merge and automated verification.
  Bug fix pipeline with automatic squash-merge. Triager analyzes the report
  and reproduces the issue. Investigator traces root cause. Setup creates the
  bugfix branch and captures the original branch. Fixer implements the fix
  with a regression test. Verifier confirms correctness. Merger squash-merges
  the fix back into the original branch (NO push, NO gh pr create).
run:
  entrypoint: triage
  timeout: 300s

agents:
  - name: triager
    role: analysis
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: agents/triager/AGENTS.md
        soul: agents/triager/SOUL.md
        identity: agents/triager/IDENTITY.md

  - name: investigator
    role: analysis
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: agents/investigator/AGENTS.md
        soul: agents/investigator/SOUL.md
        identity: agents/investigator/IDENTITY.md

  - name: setup
    role: coding
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: shared/agents/setup/AGENTS.md
        soul: shared/agents/setup/SOUL.md
        identity: shared/agents/setup/IDENTITY.md

  - name: fixer
    role: coding
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: agents/fixer/AGENTS.md
        soul: agents/fixer/SOUL.md
        identity: agents/fixer/IDENTITY.md

  - name: verifier
    role: verification
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: shared/agents/verifier/AGENTS.md
        soul: shared/agents/verifier/SOUL.md
        identity: shared/agents/verifier/IDENTITY.md

  - name: merger
    role: pr
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: agents/merger/AGENTS.md
        soul: agents/merger/SOUL.md
        identity: agents/merger/IDENTITY.md

tasks:
  - name: triage
    dependencies: []
    agent:
      ref: agents.triager
      prompt:
        content: |
          Triage the following bug report. Explore the codebase, reproduce the issue, and classify severity.

          BUG REPORT:
          {{task}}

          Instructions:
          1. Read the bug report carefully
          2. Explore the codebase to find the affected area
          3. Attempt to reproduce: run tests, check for failing cases, read error logs/stack traces
          4. Classify severity (critical/high/medium/low)
          5. Document findings

          Reply with:
          STATUS: done
          REPO: /path/to/repo
          BRANCH: bugfix-branch-name
          SEVERITY: critical|high|medium|low
          AFFECTED_AREA: what files/modules are affected
          REPRODUCTION: how to reproduce the bug
          PROBLEM_STATEMENT: clear description of what's wrong
      output:
        schema:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [done, failed]
            repo:
              type: string
            branch:
              type: string
            priority:
              type: string
            assigned_to:
              type: string
            severity:
              type: string
            affected_area:
              type: string
            reproduction:
              type: string
            problem_statement:
              type: string
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: investigate
    dependencies: [triage]
    agent:
      ref: agents.investigator
      prompt:
        content: |
          Investigate the root cause of this bug.

          BUG REPORT:
          {{task}}

          REPO: {{tasks.setup.outputs.repo}}
          SEVERITY: {{severity}}
          AFFECTED_AREA: {{affected_area}}
          REPRODUCTION: {{reproduction}}
          PROBLEM_STATEMENT: {{problem_statement}}

          Instructions:
          1. Read the code in the affected area
          2. Trace the bug to its root cause
          3. Document exactly what's wrong and why
          4. Propose a fix approach

          Reply with:
          STATUS: done
          ROOT_CAUSE: detailed explanation of the root cause
          FIX_APPROACH: what needs to change and where
      output:
        schema:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [done, failed]
            root_cause:
              type: string
            affected_files:
              type: array
            severity:
              type: string
            fix_approach:
              type: string
            problem_statement:
              type: string
            regression_test:
              type: string
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: setup
    dependencies: [investigate]
    agent:
      ref: agents.setup
      prompt:
        content: |
          Prepare the environment for the bugfix.

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}

          Instructions:
          1. cd into the repo
          2. Capture the current branch before switching: ORIGINAL_BRANCH=$(git branch --show-current)
          3. Create the bugfix branch (git checkout -b {{tasks.setup.outputs.branch}} from main)
          4. Read package.json, CI config, test config to understand build/test setup
          5. Ensure .gitignore exists — if missing, create one appropriate for the detected stack (must include .env, node_modules/, *.key, *.pem at minimum)
          6. Run the build to establish a baseline
          7. Run the tests to establish a baseline

          Reply with:
          STATUS: done
          ORIGINAL_BRANCH: <branch name captured before checkout>
          BUILD_CMD: <build command>
          TEST_CMD: <test command>
          BASELINE: <baseline status>
      output:
        schema:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [done, failed]
            original_branch:
              type: string
            build_cmd:
              type: string
            test_cmd:
              type: string
            ci_notes:
              type: string
            baseline:
              type: string
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: fix
    dependencies: [setup]
    agent:
      ref: agents.fixer
      prompt:
        content: |
          Implement the bug fix.

          BUG REPORT:
          {{task}}

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}
          BUILD_CMD: {{tasks.setup.outputs.build_cmd}}
          TEST_CMD: {{tasks.setup.outputs.test_cmd}}
          AFFECTED_AREA: {{affected_area}}
          ROOT_CAUSE: {{root_cause}}
          FIX_APPROACH: {{fix_approach}}
          PROBLEM_STATEMENT: {{problem_statement}}

          VERIFY FEEDBACK (if retrying):
          {{verify_feedback}}

          TIMEOUT RETRY (if previous attempt timed out):
          {{timeout_retry}}

          Instructions:
          1. cd into the repo, checkout the branch
          2. Implement the fix based on the root cause and fix approach
          3. Write a regression test that would have caught this bug
          4. Run {{tasks.setup.outputs.build_cmd}} to verify the build passes
          5. Run {{tasks.setup.outputs.test_cmd}} to verify all tests pass
          6. Commit: fix: brief description of the fix

          Reply with:
          STATUS: done
          CHANGES: what was changed
          REGRESSION_TEST: what test was added
      output:
        schema:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [done, failed]
            changes:
              type: string
            tests:
              type: string
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: verify
    dependencies: [fix]
    agent:
      ref: agents.verifier
      prompt:
        content: |
          Verify the bug fix is correct and complete.

          BUG REPORT:
          {{task}}

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}
          TEST_CMD: {{tasks.setup.outputs.test_cmd}}
          CHANGES: {{changes}}
          REGRESSION_TEST: {{regression_test}}
          ROOT_CAUSE: {{root_cause}}
          PROBLEM_STATEMENT: {{problem_statement}}

          Instructions:
          1. Run the full test suite with {{tasks.setup.outputs.test_cmd}}
          2. Confirm the regression test exists and tests the right thing
          3. Review the fix to confirm it addresses the root cause
          4. Check for unintended side effects
          5. Verify the regression test would fail without the fix (review the diff logic)

          MANDATORY first step:
          - Run `git diff main..{{tasks.setup.outputs.branch}} --stat` and `git diff main..{{tasks.setup.outputs.branch}}`
          - If the diff is empty or only contains trivial changes (version bumps, lockfiles), REJECT immediately
          - Compare the diff against CHANGES claimed above — if they don't match, REJECT

          Bug-fix specific checks:
          - The regression test MUST test the specific bug scenario (not just a generic test)
          - The regression test assertions must fail if the fix were reverted
          - The fix should be minimal and targeted — not a refactor disguised as a bugfix
          - Check that the fix addresses the ROOT CAUSE, not just a symptom
          - All changes must be to files INSIDE the repo — not external workspace files

          Reply with:
          STATUS: done
          VERIFIED: what was confirmed

          Or if issues found:
          STATUS: retry
          ISSUES:
          - What's wrong or incomplete
      output:
        schema:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [done, retry, failed]
            verified:
              type: string
            issues:
              type: array
    on_failure:
      max_retries: 6
      escalate_to: human

  - name: finalize-merge
    dependencies: [verify]
    agent:
      ref: agents.merger
      prompt:
        content: |
          Finalize this run by squashing bugfix changes into one commit and merging
          into the original branch. Follow the fast-forward-first process described
          in your AGENTS.md.

          TASK:
          {{task}}

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}
          ORIGINAL_BRANCH: {{tasks.setup.outputs.original_branch}}
          PROBLEM_STATEMENT: {{problem_statement}}
          ROOT_CAUSE: {{root_cause}}
          CHANGES: {{changes}}
          REGRESSION_TEST: {{regression_test}}
          VERIFIED: {{verified}}

          Follow the Required Process from your AGENTS.md:

          Phase 1 — Fast-Forward Check (ALWAYS FIRST):
          1. cd {{tasks.setup.outputs.repo}}
          2. git checkout {{tasks.setup.outputs.original_branch}}
          3. git merge-base --is-ancestor {{tasks.setup.outputs.original_branch}} {{tasks.setup.outputs.branch}}
             - Exit 0 (FF): proceed to Phase 3
             - Exit non-zero (not FF): proceed to Phase 2

          Phase 2 — Rebase (Non-Fast-Forward Path):
          4. git checkout {{tasks.setup.outputs.branch}}
          5. git rebase {{tasks.setup.outputs.original_branch}}
          6. Fix any conflicts; `git rebase --continue` until complete
          7. After rebase (clean or with conflict resolution), proceed to Phase 3.
             Bug-fix-merge has no tester step — the verifier already confirmed the fix.

          Phase 3 — Squash Merge (Fast-Forward-Safe):
          8. git checkout {{tasks.setup.outputs.original_branch}}
          9. git merge --squash {{tasks.setup.outputs.branch}}
          10. Build a descriptive commit message with `fix:` prefix (see AGENTS.md for full instructions), write it to a temp file, then commit with `git commit -F <tempfile>`

          Verify the merge commit was created:
          - MERGE_COMMIT=$(git rev-parse --short HEAD)

          Reply with:
          STATUS: done
          REBASED: <true|false>
          MERGE_COMMIT: <short commit hash>
          MERGED_INTO: {{tasks.setup.outputs.original_branch}}

          Or if merge cannot be completed:
          STATUS: retry
          REBASED: <true|false>
          FAILURE: <reason>
      output:
        schema:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [done, retry, failed]
            merged_branch:
              type: string
            merged_into:
              type: string
            reason:
              type: string
    on_failure:
      escalate_to: human