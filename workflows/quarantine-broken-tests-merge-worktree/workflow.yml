# Ralph loop (https://github.com/snarktank/ralph) — each agent runs in a fresh
# session with clean context. Memory persists via git history.
name: quarantine-broken-tests-merge-worktree
version: 1
description: |
  Detect failing tests, disable them minimally, iterate until the full
  test suite passes, and squash-merge the quarantined results back into
  the original branch. Worktree variant that runs in a detached git
  worktree created from an origin repository.

  Setup prepares the worktree environment ({{original_branch}} is
  pre-seeded by the harness since the worktree starts detached).
  Quarantiner runs the test suite, identifies failing tests, disables
  them with the least invasive technique (.skip, decorator, comment),
  and iterates until all tests pass. If no failures on first run, runs
  a second time to catch flaky tests. Verifier confirms the suite is
  clean and only test files were modified. Merger squash-merges the
  quarantined changes back into the original branch in the origin
  repository.
run:
  entrypoint: setup
  timeout: 300s
  workspace: worktree

agents:
  - name: setup
    role: coding
    settings:
      model: default
      skills:
        - tamandua-agents
      systemPrompt:
        agent: ../../agents/shared/setup/AGENTS.md
        soul: ../../agents/shared/setup/SOUL.md
        identity: ../../agents/shared/setup/IDENTITY.md

  - name: quarantiner
    role: coding
    settings:
      model: default
      skills:
        - tamandua-agents
      systemPrompt:
        agent: agents/quarantiner/AGENTS.md
        soul: agents/quarantiner/SOUL.md
        identity: agents/quarantiner/IDENTITY.md

  - name: verifier
    role: verification
    settings:
      model: default
      skills:
        - tamandua-agents
      systemPrompt:
        agent: agents/verifier/AGENTS.md
        soul: agents/verifier/SOUL.md
        identity: agents/verifier/IDENTITY.md

  - name: merger
    role: pr
    settings:
      model: default
      skills:
        - tamandua-agents
      systemPrompt:
        agent: agents/merger/AGENTS.md
        soul: agents/merger/SOUL.md
        identity: agents/merger/IDENTITY.md

tasks:
  - name: setup
    dependencies: []
    agent:
      ref: agents.setup
      prompt:
        content: |
          Prepare the environment for test quarantine in a detached git worktree.

          TASK:
          {{task}}

          REPO: {{repo}}
          BRANCH: {{branch}}
          ORIGINAL_BRANCH: {{original_branch}}
          WORKTREE_ORIGIN_REPOSITORY: {{worktree_origin_repository}}

          RETRY FEEDBACK (only present if your previous attempt was rejected — read carefully and fix specifically what it complains about):
          {{retry_feedback}}

          Instructions:
          1. cd into the repo (this is the worktree path)
          2. ORIGINAL_BRANCH is {{original_branch}} — pre-seeded by the harness since the worktree starts detached; do NOT run `git branch --show-current`
          3. Create the quarantine branch (git checkout -b {{branch}})
          4. Read package.json, CI config, test config to understand the build/test setup
          5. Ensure .gitignore exists — if missing, create one appropriate for the detected stack (must include .env, node_modules/, *.key, *.pem at minimum)
          6. Run the build to establish a baseline
          7. Run the tests to establish a baseline (note which tests fail — the quarantiner will handle them)
          8. Report what you found

          Reply with:
          STATUS: done
          ORIGINAL_BRANCH: {{original_branch}}
          BUILD_CMD: <build command>
          TEST_CMD: <test command>
          CI_NOTES: <brief CI notes>
          BASELINE: <baseline status including test results>
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: quarantine
    dependencies: [setup]
    agent:
      ref: agents.quarantiner
      prompt:
        content: |
          Find and disable failing tests until the test suite passes.

          TASK:
          {{task}}

          REPO: {{repo}}
          BRANCH: {{branch}}
          BUILD_CMD: {{build_cmd}}
          TEST_CMD: {{test_cmd}}

          RETRY FEEDBACK (only present if your previous attempt was rejected — read carefully and fix specifically what it complains about):
          {{retry_feedback}}

          Instructions:
          1. cd into the repo and ensure you're on {{branch}}
          2. Run {{build_cmd}} to confirm the project builds
          3. Run {{test_cmd}} and parse the output to find failing tests
          4. If zero failures on first run, run one more time to catch flaky tests
          5. For each failing test, disable it minimally (.skip, decorator, comment) — never modify or delete test logic
          6. Run {{test_cmd}} after each batch of changes
          7. Iterate until all tests pass — then run one final time to confirm stability
          8. Commit your changes: `chore: quarantine broken tests`. The commit message MUST end with: `Co-Authored-By: Tamandua <tamandua@tetradactyla.org>`

          Reply with:
          STATUS: done
          DISABLED: <count>
          FILES_CHANGED: <count>
          SUMMARY: <what was disabled and why>

          If unable to achieve clean suite after 5 iterations:
          STATUS: failed
          REASON: <why>
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: verify
    dependencies: [quarantine]
    agent:
      ref: agents.verifier
      prompt:
        content: |
          Verify the quarantiner's work — confirm all tests pass and only test files were modified.

          TASK:
          {{task}}

          REPO: {{repo}}
          BRANCH: {{branch}}
          BUILD_CMD: {{build_cmd}}
          TEST_CMD: {{test_cmd}}
          DISABLED: {{disabled}}
          SUMMARY: {{summary}}

          RETRY FEEDBACK (only present if your previous attempt was rejected, or if the merger rebased the branch and needs re-validation — contains CONFLICT_NOTES describing what changed):
          {{retry_feedback}}

          Check:
          1. Run {{build_cmd}} — build must pass
          2. Run {{test_cmd}} — all tests must pass (exit code 0)
          3. Run {{test_cmd}} a second time — confirm stability
          4. Inspect git diff — only test files modified, only skip/disable changes, no application code touched
          5. Verify each disabled test has an explanatory comment
          6. If retry feedback is present, the merger rebased the branch to resolve conflicts — re-validate the rebased changes listed in the feedback

          Reply with:
          STATUS: done
          VERIFIED: What you confirmed

          Or if issues found:
          STATUS: retry
          ISSUES:
          - Specific issues
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: finalize-merge
    dependencies: [verify]
    agent:
      ref: agents.merger
      prompt:
        content: |
          Finalize this run by squashing quarantine changes into one commit and merging
          into the original branch in the origin repository. Follow the fast-forward-first
          process described in your AGENTS.md.

          RUN_ID: {{run_id}}

          TASK:
          {{task}}

          REPO: {{repo}}
          BRANCH: {{branch}}
          ORIGINAL_BRANCH: {{original_branch}}
          WORKTREE_ORIGIN_REPOSITORY: {{worktree_origin_repository}}

          DISABLED: {{disabled}}
          SUMMARY: {{summary}}

          RETRY FEEDBACK (only present if the verifier re-validated a rebased branch — the verifier has confirmed the rebased changes pass; proceed to Phase 3 squash merge):
          {{retry_feedback}}

          Follow the Required Process from your AGENTS.md.

          IMPORTANT — Worktree Mode: All git operations below (phases 1–3) must run
          in the ORIGIN repository, NOT the worktree. Use:
            git -C {{worktree_origin_repository}} <command>
          for every git command. The worktree at {{repo}} contains the quarantine
          branch changes; the origin at {{worktree_origin_repository}} is where the
          merge must be finalized.

          Phase 1 — Fast-Forward Check (ALWAYS FIRST):
          1. cd {{worktree_origin_repository}}
          2. git checkout {{original_branch}}
          3. git merge-base --is-ancestor {{original_branch}} {{branch}}
             - Exit 0 (FF): proceed to Phase 3
             - Exit non-zero (not FF): proceed to Phase 2

          Phase 2 — Rebase (Non-Fast-Forward Path):
          4. cd {{repo}}
          5. git rebase {{original_branch}}
          6. Fix any conflicts; `git rebase --continue` until complete
          7. If rebase changed code/tests/docs/config:
             - Report STATUS: retry with REBASED: true, CONFLICT_NOTES, RETRY_STEP: verify
             - Do NOT merge — verifier must re-validate first
          8. If rebase was clean: proceed to Phase 3

          Phase 3 — Squash Merge (Fast-Forward-Safe):
          9. cd {{worktree_origin_repository}}
          10. git checkout {{original_branch}}
          11. git merge --squash {{branch}}
          12. Build a descriptive commit message (see AGENTS.md for full instructions), write it to a temp file, then commit with `git commit -F <tempfile>`

          Verify the merge commit was created:
          - MERGE_COMMIT=$(git rev-parse --short HEAD)

          Reply with:
          STATUS: done
          REBASED: <true|false>
          MERGE_COMMIT: <short commit hash>
          MERGED_INTO: {{original_branch}}

          Or if rebase requires verifier re-validation:
          STATUS: retry
          REBASED: true
          CONFLICT_NOTES: <description of resolved conflicts>
          RETRY_STEP: verify

          Or if merge cannot be completed:
          STATUS: retry
          REBASED: <true|false>
          FAILURE: <reason>
    on_failure:
      max_retries: 4
      escalate_to: human