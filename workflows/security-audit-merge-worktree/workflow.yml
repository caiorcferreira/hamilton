# Ralph loop (https://github.com/snarktank/ralph) — fresh context per agent session
name: security-audit-merge-worktree
version: 1
description: |
  Scan, prioritize, fix, and squash-merge security vulnerabilities in a worktree with automated verification.
  Worktree variant of the security vulnerability scanning and remediation pipeline
  with automatic squash-merge. Runs in a detached git worktree created from an
  origin repository.

  Scanner explores the codebase for vulnerabilities. Prioritizer ranks and groups
  findings. Setup prepares the worktree environment ({{tasks.setup.outputs.original_branch}} is
  pre-seeded by the harness since the worktree starts detached). Fixer implements
  each fix with regression tests. Verifier confirms each fix. Tester runs final
  integration validation. Merger squash-merges the audit fixes back into the
  original branch in the origin repository.
run:
  entrypoint: scan
  timeout: 300s
  workspace: worktree

agents:
  - name: scanner
    role: scanning
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: agents/scanner/AGENTS.md
        soul: agents/scanner/SOUL.md
        identity: agents/scanner/IDENTITY.md

  - name: prioritizer
    role: analysis
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: agents/prioritizer/AGENTS.md
        soul: agents/prioritizer/SOUL.md
        identity: agents/prioritizer/IDENTITY.md

  - name: setup
    role: coding
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: shared/agents/setup/AGENTS.md
        soul: shared/agents/setup/SOUL.md
        identity: shared/agents/setup/IDENTITY.md

  - name: fixer
    role: coding
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: agents/fixer/AGENTS.md
        soul: agents/fixer/SOUL.md
        identity: agents/fixer/IDENTITY.md

  - name: verifier
    role: verification
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: shared/agents/verifier/AGENTS.md
        soul: shared/agents/verifier/SOUL.md
        identity: shared/agents/verifier/IDENTITY.md

  - name: tester
    role: testing
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: agents/tester/AGENTS.md
        soul: agents/tester/SOUL.md
        identity: agents/tester/IDENTITY.md

  - name: merger
    role: pr
    settings:
      model: default
      skills:
        - hamilton-agents
      systemPrompt:
        agent: agents/merger/AGENTS.md
        soul: agents/merger/SOUL.md
        identity: agents/merger/IDENTITY.md

tasks:
  - name: scan
    dependencies: []
    agent:
      ref: agents.scanner
      prompt:
        content: |
          Perform a comprehensive security audit of the codebase.

          TASK:
          {{task}}

          Instructions:
          1. Explore the codebase — understand the stack, framework, dependencies
          2. Run `npm audit` (or equivalent) if a package manager is present
          3. Scan for hardcoded secrets: API keys, passwords, tokens, private keys in source
          4. Check for .env files committed to the repo
          5. Scan for common vulnerabilities:
             - SQL injection (raw queries, string concatenation in queries)
             - XSS (unescaped user input in templates/responses)
             - CSRF (missing CSRF tokens on state-changing endpoints)
             - Auth bypass (missing auth middleware, broken access control)
             - Directory traversal (user input in file paths)
             - SSRF (user-controlled URLs in server-side requests)
             - Insecure deserialization
             - Missing input validation on API endpoints
             - Insecure file permissions
             - Exposed environment variables
          6. Review auth/session handling (token expiry, session fixation, cookie flags)
          7. Check security headers (CORS, CSP, HSTS, X-Frame-Options)
          8. Document every finding with severity, file, line, and description

          Reply with:
          STATUS: done
          REPO: /path/to/repo
          BRANCH: security-audit-YYYY-MM-DD
          VULNERABILITY_COUNT: <number>
          FINDINGS: <detailed list of each vulnerability>
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: prioritize
    dependencies: [scan]
    agent:
      ref: agents.prioritizer
      prompt:
        content: |
          Prioritize and group the security findings into a fix plan.

          TASK:
          {{task}}

          REPO: {{tasks.setup.outputs.repo}}
          VULNERABILITY_COUNT: {{vulnerability_count}}
          FINDINGS: {{findings}}

          Instructions:
          1. Deduplicate findings (same root cause = one fix)
          2. Group related issues (e.g., multiple XSS from same missing sanitizer = one fix)
          3. Rank by: exploitability × impact (critical > high > medium > low)
          4. Create a prioritized fix plan — max 20 fixes
          5. If more than 20 issues, pick the top 20 by severity; note deferred items
          6. Output each fix as a story in STORIES_JSON format

          Each story object must have:
          - slug: "fix-001", "fix-002", etc.
          - title: brief description of the fix
          - description: what vulnerability it addresses, affected files, what needs to change
          - acceptance_criteria: list of criteria including "Vulnerability is no longer exploitable" and "Regression test passes"
          - severity: critical|high|medium|low

          Reply with:
          STATUS: done
          FIX_PLAN: <ordered list of fixes with severity>
          CRITICAL_COUNT: <number>
          HIGH_COUNT: <number>
          DEFERRED: <any issues skipped and why>
          STORIES_JSON: [ ... array of story objects ... ]
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: setup
    dependencies: [prioritize]
    agent:
      ref: agents.setup
      prompt:
        content: |
          Prepare the environment for security fixes in a detached git worktree.

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}
          ORIGINAL_BRANCH: {{tasks.setup.outputs.original_branch}}
          WORKTREE_ORIGIN_REPOSITORY: {{tasks.setup.outputs.worktree_origin_repository}}

          Instructions:
          1. cd into the repo (this is the worktree path)
          2. ORIGINAL_BRANCH is {{tasks.setup.outputs.original_branch}} — pre-seeded by the harness since the worktree starts detached; do NOT run `git branch --show-current`
          3. Create the security branch (git checkout -b {{tasks.setup.outputs.branch}})
          4. Read package.json, CI config, test config to understand build/test setup
          5. Ensure .gitignore exists — if missing, create one appropriate for the detected stack (must include .env, node_modules/, *.key, *.pem at minimum)
          6. Run the build to establish a baseline
          7. Run the tests to establish a baseline

          Reply with:
          STATUS: done
          ORIGINAL_BRANCH: {{tasks.setup.outputs.original_branch}}
          BUILD_CMD: <build command>
          TEST_CMD: <test command>
          BASELINE: <baseline status>
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: fix-stories
    dependencies: [setup]
    template: fix-story
    forEach:
      valueFrom:
        ref: tasks.prioritize.outputs.stories_json
      as: current_story

  - name: fix-story
    agent:
      ref: agents.fixer
      prompt:
        content: |
          Implement a security fix. You are working on ONE fix in a fresh session.

          TASK (overall):
          {{task}}

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}
          BUILD_CMD: {{tasks.setup.outputs.build_cmd}}
          TEST_CMD: {{tasks.setup.outputs.test_cmd}}

          CURRENT STORY:
          {{vars.current_story}}

          COMPLETED STORIES:
          {{completed_stories}}

          STORIES REMAINING: {{stories_remaining}}

          VERIFY FEEDBACK (if retrying):
          {{verify_feedback}}

          TIMEOUT RETRY (if previous attempt timed out):
          {{timeout_retry}}

          PROGRESS LOG:
          {{progress}}

          Instructions:
          1. cd into the repo, pull latest on the branch
          2. Read the vulnerability description carefully
          3. Implement the fix — minimal, targeted changes only
          4. Write a regression test that verifies the vulnerability is patched
          5. Run {{tasks.setup.outputs.build_cmd}} to verify the build passes
          6. Run {{tasks.setup.outputs.test_cmd}} to verify all tests pass
          7. Commit: fix(security): brief description
          8. Rewrite progress-{{run_id}}.txt with updated story results and patterns

          Reply with:
          STATUS: done
          CHANGES: what was fixed
          REGRESSION_TEST: what test was added
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: verify-stories
    dependencies: [fix-stories]
    template: verify-story
    forEach:
      valueFrom:
        ref: tasks.prioritize.outputs.stories_json
      as: current_story

  - name: verify-story
    agent:
      ref: agents.verifier
      prompt:
        content: |
          Verify the security fix is correct and the vulnerability is patched.

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}
          TEST_CMD: {{tasks.setup.outputs.test_cmd}}
          CHANGES: {{changes}}
          REGRESSION_TEST: {{regression_test}}

          CURRENT STORY:
          {{vars.current_story}}

          PROGRESS LOG:
          {{progress}}

          Instructions:
          1. Run the full test suite with {{tasks.setup.outputs.test_cmd}}
          2. Confirm the regression test exists and tests the right thing
          3. Review the fix — does it actually address the vulnerability?
          4. Check for unintended side effects
          5. Verify the regression test would fail without the fix

          Security-specific verification — think about bypass scenarios:
          - SQL Injection: Does it handle all query patterns, not just the one found?
          - XSS: Does sanitization cover all output contexts (HTML, attributes, JS, URLs)?
          - Path traversal: Does it handle URL-encoded sequences (%2e%2e), null bytes?
          - Auth bypass: Does it cover all HTTP methods (GET, POST, PUT, DELETE)?
          - CSRF: Does it validate the token server-side?
          - If the fix only blocks one payload variant, it's insufficient — STATUS: retry

          Reply with:
          STATUS: done
          VERIFIED: what was confirmed

          Or if issues found:
          STATUS: retry
          ISSUES:
          - What's wrong or incomplete
    on_failure:
      max_retries: 6
      escalate_to: human

  - name: test
    dependencies: [verify-stories]
    agent:
      ref: agents.tester
      prompt:
        content: |
          Final integration testing after all security fixes.

          TASK:
          {{task}}

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}
          BUILD_CMD: {{tasks.setup.outputs.build_cmd}}
          TEST_CMD: {{tasks.setup.outputs.test_cmd}}
          CHANGES: {{changes}}
          VULNERABILITY_COUNT: {{vulnerability_count}}

          PROGRESS LOG:
          {{progress}}

          RETRY FEEDBACK (only present if merger rebased the branch and needs re-validation — contains CONFLICT_NOTES describing what changed):
          {{retry_feedback}}

          Instructions:
          1. Run the full test suite ({{tasks.setup.outputs.test_cmd}}) — all tests must pass
          2. Run the build ({{tasks.setup.outputs.build_cmd}}) — must succeed
          3. Run `npm audit` (or equivalent) again — compare before/after
          4. Quick smoke test: does the app still start and work?
          5. Verify no regressions from the security fixes
          6. If retry feedback is present, the merger rebased the branch to resolve conflicts — re-validate the rebased changes listed in the feedback
          7. Summarize: what improved, what remains

          Reply with:
          STATUS: done
          RESULTS: test outcomes
          AUDIT_AFTER: remaining audit issues if any

          Or if issues found:
          STATUS: retry
          FAILURES:
          - What's broken
    on_failure:
      max_retries: 4
      escalate_to: human

  - name: finalize-merge
    dependencies: [test]
    agent:
      ref: agents.merger
      prompt:
        content: |
          Finalize this run by squashing security audit changes into one commit and merging
          into the original branch in the origin repository. Follow the fast-forward-first
          process described in your AGENTS.md.

          RUN_ID: {{run_id}}

          TASK:
          {{task}}

          REPO: {{tasks.setup.outputs.repo}}
          BRANCH: {{tasks.setup.outputs.branch}}
          ORIGINAL_BRANCH: {{tasks.setup.outputs.original_branch}}
          WORKTREE_ORIGIN_REPOSITORY: {{tasks.setup.outputs.worktree_origin_repository}}

          PROGRESS LOG:
          {{progress}}

          RETRY FEEDBACK (only present if the tester re-validated a rebased branch — the tester has confirmed the rebased changes pass; proceed to Phase 3 squash merge):
          {{retry_feedback}}

          Follow the Required Process from your AGENTS.md.

          IMPORTANT — Worktree Mode: All git operations below (phases 1–3) must run
          in the ORIGIN repository, NOT the worktree. Use:
            git -C {{tasks.setup.outputs.worktree_origin_repository}} <command>
          for every git command. The worktree at {{tasks.setup.outputs.repo}} contains the security branch
          changes; the origin at {{tasks.setup.outputs.worktree_origin_repository}} is where the merge
          must be finalized.

          Phase 1 — Fast-Forward Check (ALWAYS FIRST):
          1. cd {{tasks.setup.outputs.worktree_origin_repository}}
          2. git checkout {{tasks.setup.outputs.original_branch}}
          3. git merge-base --is-ancestor {{tasks.setup.outputs.original_branch}} {{tasks.setup.outputs.branch}}
             - Exit 0 (FF): proceed to Phase 3
             - Exit non-zero (not FF): proceed to Phase 2

          Phase 2 — Rebase (Non-Fast-Forward Path):
          4. cd {{tasks.setup.outputs.repo}}
          5. git rebase {{tasks.setup.outputs.original_branch}}
          6. Fix any conflicts; `git rebase --continue` until complete
          7. If rebase changed code/tests/docs/config:
             - Report STATUS: retry with REBASED: true, CONFLICT_NOTES, RETRY_STEP: test
             - Do NOT merge — tester must re-validate first
          8. If rebase was clean: proceed to Phase 3

          Phase 3 — Squash Merge (Fast-Forward-Safe):
          9. cd {{tasks.setup.outputs.worktree_origin_repository}}
          10. git checkout {{tasks.setup.outputs.original_branch}}
          11. git merge --squash {{tasks.setup.outputs.branch}}
          12. Build a descriptive commit message (see AGENTS.md for full instructions — use fix(security): prefix), write it to a temp file, then commit with `git commit -F <tempfile>`

          Verify the merge commit was created:
          - MERGE_COMMIT=$(git rev-parse --short HEAD)

          Reply with:
          STATUS: done
          REBASED: <true|false>
          MERGE_COMMIT: <short commit hash>
          MERGED_INTO: {{tasks.setup.outputs.original_branch}}

          Or if rebase requires tester re-validation:
          STATUS: retry
          REBASED: true
          CONFLICT_NOTES: <description of resolved conflicts>
          RETRY_STEP: test

          Or if merge cannot be completed:
          STATUS: retry
          REBASED: <true|false>
          FAILURE: <reason>
    on_failure:
      max_retries: 4
      escalate_to: human