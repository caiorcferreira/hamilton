name: do
version: 1
description: |
  Single general-purpose agent that takes an arbitrary task description
  and executes it end-to-end — plans, executes, and reports results.
  For quick tasks that don't need a full multi-step pipeline.
run:
  entrypoint: execute
  timeout: 300s

agents:
  - name: doer
    role: coding
    settings:
      model: default
      systemPrompt:
        agent: agents/doer/AGENTS.md
        soul: agents/doer/SOUL.md
        identity: agents/doer/IDENTITY.md

tasks:
  - name: execute
    dependencies: []
    agent:
      ref: agents.doer
      prompt:
        content: |
          Execute the following task end-to-end.

          TASK:
          {{task}}

          Instructions:
          1. Understand the task completely
          2. Plan your approach before starting
          3. Execute the plan step by step
          4. Verify the result matches the task requirements
          5. Report what you did

          Reply with:
          STATUS: done
          RESULT: Summary of what was accomplished
          CHANGES: What files or changes were made
      output:
        schema:
          content:
            type: object
            required: [status]
            properties:
            status:
              type: string
              enum: [done, failed]
            result:
              type: string
            changes:
              type: string
    on_failure:
      max_retries: 4
      escalate_to: human