slug: bug-fix
name: Bug Fix Workflow
version: 1
description: Triage, investigate, and fix bugs.
polling:
  model: default
  timeoutSeconds: 120
agents:
  - slug: triager
    role: analysis
    workspace:
      baseDir: agents/triager
      files:
        AGENTS.md: agents/triager/AGENTS.md
steps:
  - slug: triage
    agent: triager
    input: "Triage this bug: {{task}}"
    expects: "STATUS: done"
    max_retries: 4
    on_fail:
      escalate_to: human