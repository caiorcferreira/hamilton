apiVersion: dag.hamiltonai.dev/v1alpha1
kind: Workflow
metadata:
  name: do
  version: 2
  description: |
    Single general-purpose agent that takes an arbitrary task description
    and executes it end-to-end — plans, executes, and reports results.
    For quick tasks that don't need a full multi-step pipeline.
spec:
  run:
    entrypoint: execute
    timeout: 300s
  
  tasks:
    - name: execute
      dependencies: []
      agent:
        executorRef: do
        prompt:
          content: |
            Take the task described in this run from start to finish, following your
            instructions, then set your task output.
        output:
          schema:
            file: schemas/execute.json
      on_failure:
        max_retries: 4
        escalate_to: human