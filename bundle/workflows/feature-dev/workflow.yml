apiVersion: dag.hamiltonai.dev/v1alpha1
kind: Workflow
metadata:
  name: feature-dev
  version: 6
  description: |
    Plan, implement, test, and verify features story-by-story in a local-only pipeline without merge or PR.
    Story-based execution pipeline for local-only repos. Planner decomposes tasks
    into user stories. Setup prepares the environment and establishes baseline.
    Developer implements each story (with tests) in a fresh session. Verifier
    checks each story. Then integration/E2E testing.
  
    Stops after testing — does NOT create a pull request or run code review.
    Use this workflow when the repo has no remote (or no `gh` CLI), or when you
    just want the work committed locally on a feature branch. For the full
    PR-creating pipeline, use `feature-dev-github-pr`.
spec:
  run:
    entrypoint: plan
    timeout: 300s
  
  variants:
    supported: [branchout, merge, worktree, github_pr]
  
  tasks:
    - name: plan
      dependencies: []
      agent:
        executorRef: planner
        prompt:
          content: |
            ## Goal
            Decompose the following specification into ordered tasks for autonomous execution.

            
  
            ## Instructions
            1. Explore the codebase to understand the stack, conventions, and patterns
            2. Break the specification into tasks (maximun 20)
            3. Order by dependency: schema/DB first, backend, frontend, integration
            4. Each task must fit in one developer agent session (one context window)
            5. Every acceptance criterion must be mechanically verifiable
            6. Always include "typecheck passes"/"project compile" as the last criterion in every task
            7. Every tasl MUST include test criteria — "Tests for [feature] pass"
            8. The developer is expected to write tests as part of each task
        output:
          schema:
            file: schemas/plan.json
      on_failure:
        max_retries: 4
        escalate_to: human
  
    - name: setup
      dependencies: [plan]
      agent:
        executorRef: setup
        prompt:
          content: |
            ## Goal
            Prepare the development environment for this feature.

            ## Instructions
            1. Run the command: cd {{inputs.cwd}}
            2. Run the command to learn the current branch: git branch --show-current
            3. Read package.json, CI config, test config, AGENTS.md to understand the build/test setup and commands
            4. Ensure .gitignore exists — if missing, create one appropriate for the detected stack (must include .env, node_modules/, *.key, *.pem at minimum)
            5. Run the build to establish a baseline
            6. Run the tests to establish a baseline
            7. Compile a baseline report
  
            ## Output
            Set your output with:
            `{"status": "done", "current_branch": "<current-branch>", "build_cmd": "<build command>", "test_cmd": "<test command>", "ci_notes": "<brief CI notes>", "baseline": "<baseline status>"}`
        output:
          schema:
            file: schemas/setup.json
      on_failure:
        max_retries: 4
        escalate_to: human
  
    - name: apply-plan
      dependencies: [setup]
      template: implement-task
      arguments:
        forEach:
          valueFrom:
            ref: inputs.tasks.plan.outputs.tasks
          as: current_task

    - name: implement-task
      tasks:
        - name: code
          agent:
            executorRef: developer
            prompt:
              content: |
                ## Goal
                Implement the code for following task. You are working on ONE task in a fresh session.

                ## Context
                Repository: {{inputs.cwd}}
                Branch: {{inputs.tasks.setup.outputs.current_branch}}
                Build command: {{inputs.tasks.setup.outputs.build_cmd}}
                Test command: {{inputs.tasks.setup.outputs.test_cmd}}
      
                Current task:
                {{inputs.parameters.current_task}}

                {{#if input.parameters.validation_feedback}}
                ## Retry

                ### Validation feedback
                {{input.parameters.validation_feedback}}
                {{/if}}
      
                ## Instructions
                1. Read {{inputs.progress_file}} — especially the Codebase Patterns section
                2. Pull latest on the branch
                3. Implement this task only
                4. Write tests for this task's functionality
                5. Run typecheck / build
                6. Run tests to confirm they pass
                7. Commit: "feat: {{inputs.parameters.current_task.title}}"
                8. Rewrite {{inputs.progress_file}} with updated story results and patterns
                9. Update Codebase Patterns if you found reusable patterns
      
                ## Output
                Set your output with:
                `{"status": "done", "changes": "<what you implemented>", "tests": "<what tests you wrote"}`
            output:
              schema:
                file: schemas/code.json
          on_failure:
            max_retries: 4
            escalate_to: human

        - name: test
          dependencies: [code]
          agent:
            executorRef: tester
            prompt:
              content: |
                ## Goal
                Review unit tests and write integration/E2E tests for the implementation.

                ## Task
                {{inputs.parameters.current_task}}

                ## Setup
                Build command: `{{inputs.tasks.setup.outputs.build_cmd}}`
                Test command: `{{inputs.tasks.setup.outputs.test_cmd}}`
      
                ## Instructions
                Your job is:
                1. Run the full test suite ({{inputs.tasks.setup.outputs.test_cmd}}) to confirm everything passes together
                2. Look for integration issues between stories
                3. If this is a UI feature, use agent-browser to test it end-to-end
                4. Check cross-cutting concerns: error handling, edge cases across features
                5. Verify the overall feature works as a cohesive whole

                ## Output
                If sucessful, set your output with:
                `{"status": "done", "results": "<summary of tests created, modified and executed>"}`

                Or, if issues found set your output with:
                `{"status": "retry", "failures": "specific test failures or bugs found"}`
            output:
              schema:
                file: schemas/test.json
          on_failure:
            max_retries: 4
            escalate_to: human

        - name: verify-implementation
          agent:
            dependencies: [test]
            executorRef: verifier
            prompt:
              content: |
                ## Goal
                Verify the developer's work on this story.

                ## Context
                Repository: {{inputs.tasks.plan.outputs.repo}}
                Branch: {{inputs.tasks.plan.outputs.branch}}
                Test command: {{inputs.tasks.setup.outputs.test_cmd}}
      
                Current Task:
                {{inputs.parameters.current_task}}

                ## Instructions      
                Make the following checks:
                1. Code exists (not just TODOs or placeholders)
                2. Each acceptance criterion for the story is met
                3. Tests were written for this story's functionality
                4. Tests pass (run {{inputs.tasks.setup.outputs.test_cmd}})
                5. No obvious incomplete work
                6. Typecheck passes
      
                ### Visual Verification (Frontend Changes)
                Has frontend changes: {{has_frontend_changes}}
      
                If {{has_frontend_changes}} is 'true', you MUST also perform visual verification:
                1. Use the agent-browser skill to visually inspect the changed UI
                2. Open the changed HTML file directly (file:// URL) or spin up a local dev server if the project requires one
                3. Take a screenshot of the rendered page
                4. Visually confirm:
                  - Layout renders correctly (no broken/overlapping elements)
                  - Styling is applied as expected (colors, fonts, spacing)
                  - All visible elements from the story are present and properly positioned
                  - No missing images, icons, or visual assets
                  - Text is readable and not clipped or hidden
                5. A visual PASS means: the page renders without broken layout, missing elements, or overlapping content
                6. A visual FAIL means: broken layout, missing/invisible elements, overlapping or misaligned content, unstyled raw HTML, or obvious rendering errors
                7. Include your visual findings in VERIFIED output
      
                If {{has_frontend_changes}} is 'false', skip visual verification entirely.
      

                ## Output
                If sucessful, set your output with:
                `{"status": "done", "verified": "<what you confirmed>"}`

                Or, if issues found set your output with:
                `{"status": "done", "feedback": "<What's missing or incomplete>"}`
            output:
              schema:
                file: schemas/verify-implementation.json
          on_failure:
            max_retries: 4
            escalate_to: human

        - name: apply-verification-feedback
          template: implement-task
          when: 'inputs.tasks.verify-implementation.outputs.feedback != ""'
          arguments:
            parameters:
            - name: current_task
              valueFrom:
                ref: inputs.parameters.current_task
            - name: validation_feedback
              valueFrom:
                ref: inputs.tasks.verify-implementation.outputs.feedback

      
