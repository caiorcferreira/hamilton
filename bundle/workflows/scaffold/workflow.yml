apiVersion: dag.hamiltonai.dev/v1alpha1
kind: Workflow
metadata:
  name: scaffold
  version: 2
  description: |
    Scaffolds a new project from scratch. Asks for project name, tech stack,
    and description, then creates directory structure, initializes git, and
    writes a README.
spec:
  run:
    entrypoint: scaffold
    timeout: 300s
  
  tasks:
    - name: scaffold
      dependencies: []
      agent:
        executorRef: scaffolder
        prompt:
          content: |
            Scaffold a new project from the requirements described in this run (project
            name, tech stack, description). Follow your instructions, then set your task
            output.
        output:
          schema:
            file: schemas/scaffold.json
      on_failure:
        max_retries: 3
        escalate_to: human
  
    - name: verify
      dependencies: [scaffold]
      agent:
        executorRef: verifier
        prompt:
          content: |
            Verify the scaffolded project is correct and buildable, following your
            instructions, then set your task output.

            PROJECT_DIR: {{inputs.tasks.scaffold.outputs.project_dir}}
            BUILD_CMD: {{inputs.tasks.scaffold.outputs.build_cmd}}
            TEST_CMD: {{inputs.tasks.scaffold.outputs.test_cmd}}
            TECH_STACK: {{inputs.tasks.scaffold.outputs.tech_stack}}

            Confirm: project dir, README (name + description), .gitignore, the build
            command runs, and git has at least one commit.

            Set your output with status `done` and `verified` if all pass, or status
            `retry` with an `issues` list if any fail.
        output:
          schema:
            file: schemas/verify.json
      on_failure:
        max_retries: 2
        escalate_to: human