apiVersion: dag.hamiltonai.dev/v1alpha1
kind: Workflow
metadata:
  name: security-audit
  version: 3
  description: |
    Scan, prioritize, plan, and fix security vulnerabilities with automated verification in
    a local-only pipeline. Scanner explores the codebase for vulnerabilities. Prioritizer
    ranks and groups findings. Setup records the baseline. Planner turns the prioritized
    findings into small, TDD-sized fix tasks. The sec-fixer implements each task in a loop
    (via hamilton-code). The verifier confirms the fixes reached their goal. The tester runs
    final integration validation.

    Stops after testing — does NOT create a pull request. Use this workflow for local-only or
    non-GitHub repos; for the PR-creating variant use `security-audit-github-pr`.
spec:
  run:
    entrypoint: scan
    timeout: 300s
    max_recursion_depth: 3

  variants:
    supported: [branchout, merge, worktree, github_pr]

  tasks:
    - name: scan
      dependencies: []
      agent:
        executorRef: scanner
        prompt:
          content: |
            Project directory: {{inputs.project_dir}}

            Perform a comprehensive security audit of the codebase, following your
            instructions, then set your task output.
        output:
          schema:
            file: schemas/scan.json
      on_failure:
        max_retries: 4
        escalate_to: human

    - name: prioritize
      dependencies: [scan]
      agent:
        executorRef: prioritizer
        prompt:
          content: |
            REPO: {{inputs.tasks.scan.outputs.repo}}
            VULNERABILITY_COUNT: {{vulnerability_count}}
            FINDINGS: {{findings}}

            Deduplicate, group, and rank the findings into a prioritized fix plan of stories,
            following your instructions, then set your task output.
        output:
          schema:
            file: schemas/prioritize.json
      on_failure:
        max_retries: 4
        escalate_to: human

    - name: setup
      dependencies: [prioritize]
      agent:
        executorRef: setup
        prompt:
          content: |
            Project directory: {{inputs.project_dir}}

            Record the starting point and baseline for the security fixes, following your
            instructions, then set your task output.
        output:
          schema:
            file: schemas/setup.json
      on_failure:
        max_retries: 4
        escalate_to: human

    - name: plan
      dependencies: [setup]
      agent:
        executorRef: planner
        prompt:
          content: |
            Project directory: {{inputs.project_dir}}
            Prioritized fixes: {{inputs.tasks.prioritize.outputs.fix_plan}}
            Stories: {{inputs.tasks.prioritize.outputs.stories_json}}

            Turn the prioritized security findings into an ordered plan of small, TDD-sized
            tasks — each fix carrying a regression test that attempts the exploit and confirms
            it fails (a dependency version bump may rely on the lock file instead) — following
            your instructions and the `hamilton-plan` skill, then set your task output.
        output:
          schema:
            file: schemas/plan.json
      on_failure:
        max_retries: 4
        escalate_to: human

    - name: applyPlan
      dependencies: [plan]
      template: fixStory
      arguments:
        forEach:
          valueFrom:
            ref: inputs.tasks.plan.outputs.tasks
          as: current_task

    - name: review
      dependencies: [applyPlan]
      agent:
        executorRef: reviewer
        prompt:
          content: |
            Project directory: {{inputs.project_dir}}
            Branch: {{inputs.tasks.scan.outputs.branch}}
            Test command: {{inputs.tasks.setup.outputs.test_cmd}}
            Baseline commit: {{inputs.tasks.setup.outputs.baseline_sha}}
            Progress ledger: {{inputs.tasks.plan.outputs.progress_file}}

            All planned security fixes are implemented. Review the whole change
            (`git diff {{inputs.tasks.setup.outputs.baseline_sha}}..HEAD`) as one quality
            gate, following your instructions and the `hamilton-review` skill; write
            `review.md` and set your task output. Beyond your standard checks, think about
            bypass scenarios — a fix that blocks only one payload variant is insufficient
            (changes-requested):
            - SQL injection: all query patterns, not just the one found?
            - XSS: all output contexts (HTML, attributes, JS, URLs)?
            - Path traversal: URL-encoded sequences (%2e%2e), null bytes?
            - Auth bypass: all HTTP methods (GET, POST, PUT, DELETE)?
            - CSRF: token validated server-side?
        output:
          schema:
            file: schemas/review.json
      on_failure:
        max_retries: 6
        escalate_to: human

    - name: test
      dependencies: [review]
      agent:
        executorRef: sec-tester
        prompt:
          content: |
            REPO: {{inputs.tasks.scan.outputs.repo}}
            BRANCH: {{inputs.tasks.scan.outputs.branch}}
            BUILD_CMD: {{inputs.tasks.setup.outputs.build_cmd}}
            TEST_CMD: {{inputs.tasks.setup.outputs.test_cmd}}
            VULNERABILITY_COUNT: {{vulnerability_count}}

            Run final integration testing after all security fixes, following your
            instructions, then set your task output. Re-run the dependency audit and compare
            before/after, and confirm no regressions from the fixes.

            Reply with:
            STATUS: done
            RESULTS: test outcomes
            AUDIT_AFTER: remaining audit issues if any

            Or if issues found:
            STATUS: retry
            FAILURES:
            - What's broken
        output:
          schema:
            file: schemas/test.json
      on_failure:
        max_retries: 4
        escalate_to: human

    - name: fixStory
      tasks:
        - name: fix-story
          agent:
            executorRef: sec-fixer
            prompt:
              content: |
                Repository: {{inputs.project_dir}}
                Branch: {{inputs.tasks.scan.outputs.branch}}
                Build command: {{inputs.tasks.setup.outputs.build_cmd}}
                Test command: {{inputs.tasks.setup.outputs.test_cmd}}
                Progress ledger: {{inputs.tasks.plan.outputs.progress_file}}

                Implement exactly this one security-fix task — including its regression test —
                following your instructions and the `hamilton-code` skill, then set your task
                output.

                Current task:
                {{inputs.parameters.current_task}}
            output:
              schema:
                file: schemas/fix-story.json
          on_failure:
            max_retries: 4
            escalate_to: human
