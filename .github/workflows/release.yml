name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check-version:
    name: Check if version changed
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version-check.outputs.should_release }}
      version: ${{ steps.read-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read package.json version
        id: read-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version should be released
        id: version-check
        run: |
          VERSION="${{ steps.read-version.outputs.version }}"
          TAG="v$VERSION"

          # Most recent published release, empty if none exists yet.
          LATEST_RELEASE=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' || echo "")

          # No version change: package.json matches the latest published
          # release. Skip cleanly — no tag, no build, no publish.
          if [ "$TAG" = "$LATEST_RELEASE" ]; then
            echo "Version $VERSION already released as $TAG; nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # We intend to release $TAG. If the tag already exists on the remote
          # but isn't the latest release, it's a leftover from a run that
          # failed after tagging but before publishing. Fail loudly with a
          # recovery hint rather than pushing it again later (which errors
          # cryptically) or reusing it (which would leave the tag pointing at
          # a different commit than the artifacts built by this run).
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Error: tag $TAG already exists on the remote but has no matching release." >&2
            echo "An earlier release run likely failed after creating the tag." >&2
            echo "Delete the tag and re-run:  git push origin --delete $TAG" >&2
            exit 1
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

  tag:
    name: Create version tag
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          TAG="v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$TAG"
          git push origin "$TAG"

  lint:
    name: Lint install script
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck install.sh

  build:
    name: Build CLI binaries
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: x64
          - os: darwin
            arch: arm64
          - os: linux
            arch: x64
          - os: linux
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          # node-llama-cpp (pulled in transitively via @tobilu/qmd) ships
          # per-platform native .node addons and dynamically imports every
          # platform variant. bun's single-file --compile can't statically
          # resolve those, and native addons can't be embedded in a
          # standalone binary anyway. Mark them external: the memory store
          # degrades gracefully when the module can't load at runtime.
          bun build --compile \
            --target=bun-${{ matrix.os }}-${{ matrix.arch }} \
            --external node-llama-cpp \
            --external '@node-llama-cpp/*' \
            src/cli/main.ts \
            --outfile hamilton-${{ matrix.os }}-${{ matrix.arch }}

      - name: Test binary (linux-x64 only)
        if: matrix.os == 'linux' && matrix.arch == 'x64'
        run: |
          chmod +x ./hamilton-linux-x64
          ./hamilton-linux-x64 --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: hamilton-${{ matrix.os }}-${{ matrix.arch }}
          path: hamilton-${{ matrix.os }}-${{ matrix.arch }}
          retention-days: 1

  package:
    name: Package artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          for dir in artifacts/*/; do
            mv "$dir"/* .
            rmdir "$dir"
          done
          ls -la

      - name: Create bundle archive
        run: tar czf hamilton-bundle.tar.gz bundle/

      - name: Generate checksums
        run: |
          sha256sum hamilton-* hamilton-bundle.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: SHA256SUMS
          retention-days: 1

      - name: Upload bundle archive
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: hamilton-bundle.tar.gz
          retention-days: 1

  publish:
    name: Publish release
    needs:
      - check-version
      - package
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          # Flatten every artifact into release-assets/ instead of one
          # subdirectory per artifact. Without this, each binary lands in a
          # directory sharing its own name (release-assets/hamilton-darwin-arm64/
          # hamilton-darwin-arm64), which broke the old manual flatten.
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets

      - name: Create GitHub Release
        run: |
          gh release create "v${{ needs.check-version.outputs.version }}" \
            release-assets/* \
            --title "v${{ needs.check-version.outputs.version }}"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
